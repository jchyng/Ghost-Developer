<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost Developer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { lowest: '#0E0E0E', DEFAULT: '#131313', low: '#1C1B1B', high: '#2A2A2A', variant: '#353534' },
            primary: { DEFAULT: '#A4C9FF', container: '#60A5FA' },
            secondary: { DEFAULT: '#45DFA4', container: '#00BD85' },
            'on-surface': { DEFAULT: '#E5E2E1', variant: '#C1C7D3' },
            'outline-variant': '#414751',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
        }
      }
    };
  </script>
  <style>
    body { background: #131313; color: #E5E2E1; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #353534; border-radius: 3px; }
    .xterm-viewport { overflow-y: auto !important; }
    #term-panel .xterm { height: 100%; }
    #resize-handle { cursor: ns-resize; }
    .chat-item.active { background: rgba(28,27,27,0.5); }
    .chat-item.active .pipe { opacity: 1; }
    .pipe { opacity: 0; }
    /* msg-user는 JS에서 인라인 스타일로 대체됨 */
    .tab-active { background: #0E0E0E; border-top: 1px solid; border-left: 1px solid rgba(65,71,81,0.2); border-right: 1px solid rgba(65,71,81,0.2); }
    .tab-inactive { background: transparent; color: #C1C7D3; }
    @keyframes typing-bounce {
      0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }
    .typing-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #45DFA4; animation: typing-bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes sidebar-pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    .running-dot { width:6px;height:6px;border-radius:50%;background:#45DFA4;flex-shrink:0;animation:sidebar-pulse 1.4s ease-in-out infinite; }
    .hljs-pre { background:#0E0E0E; border:1px solid rgba(65,71,81,0.2); border-radius:8px; padding:12px 14px; margin:8px 0; overflow-x:auto; font-size:12px; line-height:1.6; }
    .hljs-pre code { font-family:'JetBrains Mono',monospace; background:transparent; padding:0; }
  </style>
</head>

<body class="flex h-screen overflow-hidden font-sans select-none">

<!-- ═══ SIDEBAR ═══════════════════════════════════════════════════════════ -->
<aside id="sidebar" class="flex flex-col w-[280px] bg-surface-lowest flex-shrink-0">

  <!-- Logo -->
  <div class="px-4 py-4 flex items-center gap-2">
    <i data-lucide="sparkles" class="w-5 h-5 text-secondary flex-shrink-0"></i>
    <span class="font-semibold text-base tracking-tight">Ghost Developer</span>
  </div>

  <!-- New Chat -->
  <div class="px-3 pb-3">
    <button onclick="openNewChatModal()"
      class="w-full flex items-center justify-center gap-2 py-2 px-4 rounded-md text-sm font-medium
             border border-[rgba(65,71,81,0.2)] hover:bg-surface-high transition-colors">
      <i data-lucide="plus" class="w-4 h-4"></i> New Chat
    </button>
  </div>

  <!-- Chat List -->
  <div class="flex-1 overflow-y-auto py-2">
    <div class="px-4 mb-2 text-[0.65rem] uppercase tracking-widest text-on-surface-variant font-semibold">
      Recent Chats
    </div>
    <nav id="chat-list" class="flex flex-col gap-0.5"></nav>
  </div>

  <!-- Footer: Ctrl+K hint -->
  <div class="px-4 py-3 border-t border-[rgba(65,71,81,0.1)]">
    <span class="text-[0.6rem] font-mono text-on-surface-variant/30 tracking-widest">CTRL+K  NEW CHAT</span>
  </div>
</aside>

<!-- ═══ MAIN ═══════════════════════════════════════════════════════════════ -->
<main class="flex-1 flex flex-col min-w-0">

  <!-- Top Bar -->
  <header class="h-14 flex items-center justify-between px-6 flex-shrink-0">
    <div class="flex items-center gap-2 text-sm text-on-surface-variant">
      <i data-lucide="home" class="w-4 h-4"></i>
      <i data-lucide="chevron-right" class="w-3 h-3"></i>
      <span id="header-title" class="text-on-surface text-sm truncate max-w-[320px]">—</span>
      <span id="header-cwd-wrap" class="hidden items-center gap-1" style="display:none">
        <i data-lucide="chevron-right" class="w-3 h-3"></i>
        <span id="header-cwd" class="font-mono text-xs text-on-surface-variant/60 truncate max-w-[200px]"></span>
      </span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="toggleTerminal()"
        class="p-2 text-on-surface-variant hover:text-on-surface hover:bg-surface-low rounded-md transition-colors" title="터미널 토글">
        <i data-lucide="terminal" class="w-4 h-4"></i>
      </button>
      <button id="interrupt-btn" onclick="cancelChat()" style="display:none"
        class="flex items-center gap-2 px-3 py-1.5 rounded-md border border-red-900/30 text-red-400 text-xs font-mono hover:bg-red-900/10 transition-colors">
        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
        INTERRUPT (CTRL+C)
      </button>
    </div>
  </header>

  <!-- Chat + Terminal (flex-1, scroll inside) -->
  <div class="flex-1 flex flex-col min-h-0">

    <!-- Chat Messages -->
    <div id="chat-area" class="flex-1 overflow-y-auto py-2 select-text cursor-text relative">
      <div id="chat-inner" class="max-w-[900px] mx-auto px-4 flex flex-col gap-0">
        <!-- Empty state / Welcome -->
        <div id="empty-state" class="flex flex-col items-center justify-center gap-6 select-none" style="min-height:70vh">
          <div class="flex flex-col items-center gap-3">
            <div class="w-14 h-14 rounded-2xl bg-surface-low border border-[rgba(65,71,81,0.18)] flex items-center justify-center mb-1">
              <i data-lucide="sparkles" class="w-7 h-7 text-secondary opacity-60"></i>
            </div>
            <h1 class="text-[1.35rem] font-semibold tracking-tight text-on-surface/80">Ghost Developer</h1>
            <p class="text-[0.8rem] text-on-surface-variant/45 tracking-wide">작업 폴더를 지정하고 나를 대신해 개발을 시작하세요.</p>
          </div>
          <button onclick="openNewChatModal()"
            class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium text-[#0E0E0E]
                   bg-gradient-to-br from-primary to-primary-container
                   hover:opacity-90 active:scale-95 transition-all duration-150 shadow-[0_4px_20px_rgba(96,165,250,0.2)]">
            <i data-lucide="plus" class="w-4 h-4"></i>
            새 채팅 시작하기
          </button>
          <p class="text-[0.6rem] font-mono text-on-surface-variant/20 tracking-widest">CTRL+K</p>
        </div>
      </div>
      <!-- Scroll-to-bottom button -->
      <button id="scroll-btn" onclick="scrollToBottom()" style="display:none"
        class="absolute bottom-4 right-4 flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-mono
               bg-surface-high border border-[rgba(65,71,81,0.3)] text-secondary shadow-lg
               hover:bg-surface-variant transition-all">
        <i data-lucide="arrow-down" class="w-3 h-3"></i> 새 메시지
      </button>
    </div>

    <!-- Terminal Panel (docked, resizable) -->
    <div id="term-panel" class="flex flex-col flex-shrink-0 bg-[#0A0A0A]" style="height:220px; display:none">
      <!-- Resize Handle -->
      <div id="resize-handle" class="flex items-center justify-center h-3 flex-shrink-0 hover:bg-surface-low/30">
        <div class="w-8 h-[3px] rounded-full bg-[rgba(65,71,81,0.4)]"></div>
      </div>
      <!-- Tabs -->
      <div id="term-tabs" class="flex items-center px-2 gap-1 bg-surface-lowest flex-shrink-0">
        <!-- tabs rendered dynamically -->
      </div>
      <!-- Term Container -->
      <div id="term-container" class="flex-1 overflow-hidden px-2 pb-2"></div>
    </div>

  </div><!-- /chat+terminal -->

  <!-- Input Bar -->
  <div id="input-bar" class="px-8 pt-3 pb-5 flex-shrink-0" style="display:none">
    <div class="max-w-[900px] mx-auto">
      <div id="input-wrap"
        class="flex items-end gap-3 bg-surface-low rounded-2xl border border-[rgba(65,71,81,0.22)] px-4 py-3
               focus-within:border-[rgba(65,71,81,0.5)] transition-all duration-200">
        <textarea id="msg-input" rows="1" placeholder="Ghost에게 개발을 맡겨보세요..."
          class="flex-1 bg-transparent text-sm text-on-surface placeholder:text-[rgba(193,199,211,0.35)]
                 resize-none outline-none min-h-[24px] max-h-[160px] leading-relaxed self-center"
          onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
        <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
          <button onclick="sendMessage()"
            class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-primary-container text-[#0E0E0E]
                   hover:opacity-85 active:scale-95 transition-all duration-150 flex items-center justify-center">
            <i data-lucide="arrow-up" class="w-4 h-4"></i>
          </button>
          <span class="text-[0.55rem] font-mono text-on-surface-variant/25 whitespace-nowrap">Ctrl+↵ 전송</span>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- ═══ NEW CHAT MODAL ════════════════════════════════════════════════════ -->
<div id="modal-overlay" onclick="closeModal(event)"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm" style="display:none!important">
  <div class="bg-surface-low rounded-xl border border-[rgba(65,71,81,0.2)] p-6 w-full max-w-md mx-4 shadow-[0_20px_50px_rgba(0,0,0,0.5)]"
    onclick="event.stopPropagation()">
    <h2 class="text-base font-semibold mb-4">New Chat</h2>
    <div class="flex flex-col gap-3">
      <div>
        <label class="text-[0.65rem] uppercase tracking-widest text-on-surface-variant block mb-1">Working Directory</label>
        <div class="relative">
          <div class="relative">
            <input id="modal-cwd" type="text" placeholder="C:\dev\my-project" autocomplete="off" spellcheck="false"
              class="w-full bg-surface rounded-md border border-[rgba(65,71,81,0.2)] px-3 py-2 pr-8 text-sm font-mono outline-none
                     focus:border-secondary/50 transition-colors"
              oninput="handleCwdInput()" onfocus="openBrowserAuto()" onkeydown="handleCwdKeydown(event)" />
            <i data-lucide="folder" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-on-surface-variant/30 pointer-events-none"></i>
          </div>
          <!-- Directory browser popover (fixed so it never overlaps modal content) -->
          <div id="dir-browser" class="hidden fixed z-[60] overflow-hidden
               bg-surface-lowest border border-[rgba(65,71,81,0.25)] rounded-lg shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <div class="flex items-center gap-1 px-2 py-1.5 bg-surface border-b border-[rgba(65,71,81,0.15)]">
              <button type="button" onmousedown="event.preventDefault(); goHome()" title="Home"
                class="p-1 rounded text-on-surface-variant hover:text-secondary transition-colors">
                <i data-lucide="home" class="w-3.5 h-3.5"></i>
              </button>
              <button type="button" onmousedown="event.preventDefault(); goUp()" title="Up"
                class="p-1 rounded text-on-surface-variant hover:text-on-surface transition-colors">
                <i data-lucide="corner-left-up" class="w-3.5 h-3.5"></i>
              </button>
              <span id="browser-path" class="text-[10px] font-mono text-on-surface-variant/40 truncate flex-1 ml-1 select-text"></span>
            </div>
            <div id="browser-list" class="max-h-48 overflow-y-auto"></div>
          </div>
        </div>
      </div>
      <div>
        <label class="text-[0.65rem] uppercase tracking-widest text-on-surface-variant block mb-1">Title (optional)</label>
        <input id="modal-title" type="text" placeholder="자동으로 cwd 사용"
          class="w-full bg-surface rounded-md border border-[rgba(65,71,81,0.2)] px-3 py-2 text-sm outline-none
                 focus:border-secondary/50 transition-colors" />
      </div>
    </div>
    <div class="flex gap-2 mt-5 justify-end">
      <button onclick="closeNewChatModal()"
        class="px-4 py-2 text-sm text-on-surface-variant hover:text-on-surface transition-colors">Cancel</button>
      <button onclick="createChat()"
        class="px-4 py-2 text-sm rounded-md bg-gradient-to-br from-primary to-primary-container text-[#0E0E0E] font-medium hover:opacity-90 transition-opacity">
        Create
      </button>
    </div>
  </div>
</div>

<!-- ═══ SCRIPTS ═══════════════════════════════════════════════════════════ -->
<script>
// ── State ─────────────────────────────────────────────────────────────────
let activeChatId = null;
let chatWs = null;
let isRunning = false;
let termVisible = false;
let activeChatData = null;  // 현재 열린 채팅의 전체 데이터

// Terminal tabs: [{id, label, kind('log'|'pty'), term, fitAddon, ws}]
let tabs = [];
let activeTabId = null;

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  lucide.createIcons();
  initResizeHandle();
  await loadChats();
  // keyboard shortcut
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'c' && isRunning) {
      e.preventDefault();
      cancelChat();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      openNewChatModal();
    }
    if (e.key === 'Escape') {
      const browser = document.getElementById('dir-browser');
      if (browser && !browser.classList.contains('hidden')) {
        browser.classList.add('hidden');
        document.getElementById('modal-title').focus();
      }
    }
  });
});

// ── Chat List ─────────────────────────────────────────────────────────────
async function loadChats() {
  const chats = await api('GET', '/api/chats');
  renderChatList(chats);
  if (chats.length > 0 && !activeChatId) {
    selectChat(chats[0].id, chats[0]);
  }
}

function renderChatList(chats) {
  const nav = document.getElementById('chat-list');
  nav.innerHTML = '';
  if (chats.length === 0) {
    nav.innerHTML = '<div class="px-4 py-2 text-xs text-on-surface-variant/50">채팅 없음</div>';
    return;
  }
  chats.forEach(chat => {
    const btn = document.createElement('button');
    btn.className = 'chat-item w-full flex items-center gap-3 px-4 py-2 text-sm relative group hover:bg-surface-low/30 transition-colors';
    btn.dataset.id = chat.id;
    btn.innerHTML = `
      <div class="pipe absolute left-0 top-1/2 -translate-y-1/2 w-[2px] h-5 bg-secondary rounded-r-full shadow-[0_0_8px_rgba(69,223,164,0.4)]"></div>
      <i data-lucide="message-square" class="w-4 h-4 flex-shrink-0 text-on-surface-variant"></i>
      <span class="chat-title truncate flex-1 text-on-surface-variant group-hover:text-on-surface">${esc(chat.title || chat.cwd)}</span>
      <div class="chat-actions flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
        <button class="btn-rename p-1 rounded hover:bg-surface-high text-on-surface-variant hover:text-on-surface transition-colors" title="Rename">
          <i data-lucide="pencil" class="w-3 h-3 pointer-events-none"></i>
        </button>
        <button class="btn-delete p-1 rounded hover:bg-red-900/20 text-on-surface-variant hover:text-red-400 transition-colors" title="Delete">
          <i data-lucide="trash-2" class="w-3 h-3 pointer-events-none"></i>
        </button>
      </div>`;
    btn.onclick = () => selectChat(chat.id, chat);
    btn.ondblclick = e => { e.stopPropagation(); startInlineRename(chat.id, btn); };
    btn.querySelector('.btn-rename').onclick = e => { e.stopPropagation(); startInlineRename(chat.id, btn); };
    btn.querySelector('.btn-delete').onclick = e => { e.stopPropagation(); confirmDeleteChat(chat.id, chat.title || chat.cwd); };
    nav.appendChild(btn);
  });
  lucide.createIcons();
  // re-apply active state
  if (activeChatId) highlightChat(activeChatId);
}

function highlightChat(chatId) {
  document.querySelectorAll('.chat-item').forEach(el => {
    const active = el.dataset.id === chatId;
    el.classList.toggle('active', active);
    el.querySelector('.pipe')?.classList.toggle('opacity-100', active);
    el.querySelector('.chat-title')?.classList.toggle('text-on-surface', active);
  });
}

// ── Select Chat ───────────────────────────────────────────────────────────
function selectChat(chatId, chat) {
  activeChatId = chatId;
  highlightChat(chatId);

  activeChatData = chat || null;
  document.getElementById('input-bar').style.display = '';

  // Update header
  updateHeader(chat);

  // Reconnect WebSocket — onclose 제거 후 닫아야 재연결 루프 방지
  if (chatWs) {
    chatWs.onclose = null;
    chatWs.close();
    chatWs = null;
  }
  _historyLoaded = false;
  connectChatWs(chatId);

  // Clear chat area (keep empty state hidden)
  clearMessages();

  // Ensure log tab exists
  ensureLogTab();
}

function connectChatWs(chatId) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  chatWs = new WebSocket(`${proto}://${location.host}/ws/chats/${chatId}`);
  chatWs.onmessage = e => handleChatEvent(JSON.parse(e.data));
  chatWs.onclose = () => {
    // retry after 2s if same chat still active
    setTimeout(() => { if (activeChatId === chatId) connectChatWs(chatId); }, 2000);
  };
}

// ── Chat Event Handler ────────────────────────────────────────────────────
let _historyLoaded = false;

function handleChatEvent(e) {
  switch (e.type) {
    case 'history':
      // 첫 연결 시에만 히스토리 렌더링 — 재연결 시 중복 방지
      if (!_historyLoaded) {
        _historyLoaded = true;
        renderMessages(e.messages);
      }
      break;
    case 'system':
      writeLog(`\x1b[90m${e.text}\x1b[0m\r\n`);
      break;
    case 'claude_text':
      writeLog(e.text.replace(/\n/g, '\r\n'));
      break;
    case 'tool_use':
      writeLog(`\x1b[33m[TOOL] ${e.name}\x1b[0m\r\n`);
      break;
    case 'done':
      addMessage('assistant', e.result);
      setRunning(false);
      break;
    case 'clarify':
      addMessage('assistant', e.message);
      setRunning(false);
      break;
    case 'error':
      writeLog(`\x1b[31m[ERROR] ${e.message}\x1b[0m\r\n`);
      addStatusMessage(`오류: ${e.message}`, 'error');
      setRunning(false);
      break;
    case 'cancelled':
      writeLog(`\x1b[90m[CANCELLED]\x1b[0m\r\n`);
      setRunning(false);
      break;
    case 'rate_limit': {
      const t = new Date(e.resets_at * 1000).toLocaleTimeString();
      writeLog(`\x1b[31m[RATE LIMIT] Resumes at ${t}\x1b[0m\r\n`);
      addStatusMessage(`Rate limit — ${t} 이후 재개`, 'warn');
      setRunning(false);
      break;
    }
    case 'title_update': {
      const el = document.querySelector(`.chat-item[data-id="${e.chat_id}"] .chat-title`);
      if (el && el.tagName !== 'INPUT') el.textContent = e.title;
      if (e.chat_id === activeChatId) {
        if (activeChatData) activeChatData.title = e.title;
        updateHeader(activeChatData);
      }
      break;
    }
  }
}

function updateHeader(chat) {
  const chatId = chat?.id || activeChatId;
  const headerTitle = chat?.title && chat.title !== chat?.cwd ? chat.title : (chat?.cwd || chatId || '—');
  document.getElementById('header-title').textContent = headerTitle;
  const cwdWrap = document.getElementById('header-cwd-wrap');
  if (chat?.cwd && chat.title !== chat.cwd) {
    document.getElementById('header-cwd').textContent = chat.cwd;
    cwdWrap.style.display = 'flex';
  } else {
    cwdWrap.style.display = 'none';
  }
}

// ── Chat Management ────────────────────────────────────────────────────────
async function confirmDeleteChat(chatId, title) {
  const item = document.querySelector(`.chat-item[data-id="${chatId}"]`);
  if (!item) return;
  const actions = item.querySelector('.chat-actions');
  actions.innerHTML = `
    <span class="text-xs font-mono text-red-400 mr-1">삭제?</span>
    <button class="btn-yes px-1.5 py-0.5 rounded bg-red-900/30 hover:bg-red-900/50 text-red-400 text-xs font-mono">예</button>
    <button class="btn-no px-1.5 py-0.5 rounded hover:bg-surface-high text-on-surface-variant text-xs font-mono">아니오</button>`;
  actions.style.opacity = '1';

  actions.querySelector('.btn-yes').onclick = async e => {
    e.stopPropagation();
    await api('DELETE', `/api/chats/${chatId}`);
    if (activeChatId === chatId) {
      activeChatId = null;
      clearMessages();
      if (chatWs) { chatWs.onclose = null; chatWs.close(); chatWs = null; }
      document.getElementById('header-title').textContent = '—';
      document.getElementById('header-cwd-wrap').style.display = 'none';
      document.getElementById('input-bar').style.display = 'none';
    }
    await loadChats();
  };
  actions.querySelector('.btn-no').onclick = e => { e.stopPropagation(); loadChats(); };
}

function startInlineRename(chatId, itemEl) {
  const titleSpan = itemEl.querySelector('.chat-title');
  if (!titleSpan || titleSpan.tagName === 'INPUT') return;
  const currentTitle = titleSpan.textContent;
  const actions = itemEl.querySelector('.chat-actions');

  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentTitle;
  input.className = 'chat-title flex-1 bg-transparent text-sm text-on-surface outline-none border-b border-secondary/60 min-w-0';
  titleSpan.replaceWith(input);
  actions.style.opacity = '0';
  input.focus();
  input.select();

  async function commit() {
    const newTitle = input.value.trim();
    const span = document.createElement('span');
    span.className = 'chat-title truncate flex-1 text-on-surface-variant group-hover:text-on-surface';
    span.textContent = newTitle || currentTitle;
    input.replaceWith(span);
    actions.style.opacity = '';
    if (newTitle && newTitle !== currentTitle) {
      await api('PATCH', `/api/chats/${chatId}`, { title: newTitle });
    }
  }

  input.onblur = commit;
  input.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
  };
  input.onclick = e => e.stopPropagation();
}

// ── Send Message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !activeChatId || isRunning) return;

  // 즉시 잠금 — 버튼 중복 클릭 / Ctrl+Enter 동시 입력 방지
  isRunning = true;
  input.value = '';
  autoResize(input);

  addMessage('user', content);
  setRunning(true);

  // Show terminal panel automatically
  if (!termVisible) showTerminal();
  writeLog(`\x1b[90m━━━ ${new Date().toLocaleTimeString()} ━━━\x1b[0m\r\n`);

  const res = await api('POST', `/api/chats/${activeChatId}/send`, { content });
  if (res.error) {
    addStatusMessage(res.error, 'error');
    setRunning(false);
  }
}

function handleInputKey(e) {
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ── Terminal Panel ────────────────────────────────────────────────────────
function ensureLogTab() {
  if (tabs.find(t => t.kind === 'log')) return;
  const tab = { id: 'log', label: 'Agent Log', kind: 'log', color: '#45DFA4', term: null, fitAddon: null, ws: null };
  tabs.push(tab);
  renderTabs();
  if (!activeTabId) activateTab('log');
}

function renderTabs() {
  const bar = document.getElementById('term-tabs');
  bar.innerHTML = '';
  tabs.forEach(tab => {
    const isActive = tab.id === activeTabId;
    const color = tab.color || '#C1C7D3';
    const btn = document.createElement('button');
    btn.className = `px-3 py-1.5 text-xs font-mono rounded-t-md transition-colors flex items-center gap-1.5 ${isActive ? 'tab-active text-on-surface' : 'tab-inactive hover:text-on-surface'}`;
    if (isActive) btn.style.borderTopColor = color;
    const dot = `<span style="font-size:8px; color:${color}; ${isActive ? `filter:drop-shadow(0 0 3px ${color})` : 'opacity:0.35'}">●</span>`;
    btn.innerHTML = `${dot}${esc(tab.label)}`;
    btn.onclick = () => activateTab(tab.id);
    bar.appendChild(btn);
  });
  // [+] button
  const plus = document.createElement('button');
  plus.className = 'p-1.5 text-on-surface-variant hover:text-on-surface transition-colors ml-1';
  plus.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>';
  plus.onclick = addPtyTab;
  bar.appendChild(plus);
}

function activateTab(tabId) {
  activeTabId = tabId;
  renderTabs();

  const container = document.getElementById('term-container');
  // Hide all xterm divs
  container.querySelectorAll('.xterm-wrap').forEach(el => el.style.display = 'none');

  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;

  let wrap = container.querySelector(`[data-tab="${tabId}"]`);
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.className = 'xterm-wrap';
    wrap.dataset.tab = tabId;
    wrap.style.height = '100%';
    container.appendChild(wrap);
  }
  wrap.style.display = 'block';

  if (!tab.term) {
    const term = new Terminal({
      theme: { background: '#0A0A0A', foreground: '#E5E2E1', cursor: '#E5E2E1', selectionBackground: 'rgba(96,165,250,0.3)' },
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 13,
      lineHeight: 1.5,
      cursorBlink: tab.kind === 'pty',
      disableStdin: tab.kind === 'log',
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(wrap);
    fitAddon.fit();
    tab.term = term;
    tab.fitAddon = fitAddon;

    if (tab.kind === 'pty') connectPtyWs(tab);
    if (tab.kind === 'log') {
      term.write('\x1b[90m[Agent Log ready — AI activity will appear here]\x1b[0m\r\n');
    }

    // re-fit on panel resize
    new ResizeObserver(() => { try { fitAddon.fit(); } catch(_){} }).observe(wrap);
  } else {
    try { tab.fitAddon.fit(); } catch(_){}
  }
}

function writeLog(text) {
  const tab = tabs.find(t => t.kind === 'log');
  if (tab?.term) tab.term.write(text);
}

// PTY tab
function addPtyTab() {
  const id = 'pty-' + Date.now();
  const label = `Shell ${tabs.filter(t => t.kind === 'pty').length + 1}`;
  tabs.push({ id, label, kind: 'pty', color: '#60A5FA', term: null, fitAddon: null, ws: null });
  renderTabs();
  activateTab(id);
  if (!termVisible) showTerminal();
}

function connectPtyWs(tab) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  tab.ws = new WebSocket(`${proto}://${location.host}/ws/${tab.id}`);
  tab.ws.binaryType = 'arraybuffer';
  tab.ws.onopen = () => sendResize(tab);
  tab.ws.onmessage = e => {
    const data = e.data instanceof ArrayBuffer ? new Uint8Array(e.data) : e.data;
    tab.term?.write(data);
  };
  tab.ws.onclose = () => {
    tab.term?.write('\r\n\x1b[90m[disconnected]\x1b[0m\r\n');
  };
  tab.term.onData(d => tab.ws.readyState === 1 && tab.ws.send(d));
  tab.term.onResize(({ cols, rows }) => sendResize(tab, cols, rows));
}

function sendResize(tab, cols, rows) {
  if (!tab.ws || tab.ws.readyState !== 1) return;
  cols = cols || tab.term?.cols || 80;
  rows = rows || tab.term?.rows || 24;
  tab.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
}

// ── Terminal Panel Toggle & Resize ────────────────────────────────────────
function showTerminal() {
  termVisible = true;
  const panel = document.getElementById('term-panel');
  panel.style.display = 'flex';
  ensureLogTab();
  setTimeout(() => {
    const tab = tabs.find(t => t.id === activeTabId);
    try { tab?.fitAddon?.fit(); } catch(_){}
  }, 50);
}

function hideTerminal() {
  termVisible = false;
  document.getElementById('term-panel').style.display = 'none';
}

function toggleTerminal() {
  termVisible ? hideTerminal() : showTerminal();
}

function initResizeHandle() {
  const handle = document.getElementById('resize-handle');
  const panel = document.getElementById('term-panel');
  let startY, startH;
  handle.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = panel.offsetHeight;
    const onMove = e => {
      const delta = startY - e.clientY;
      panel.style.height = Math.max(100, Math.min(600, startH + delta)) + 'px';
      const tab = tabs.find(t => t.id === activeTabId);
      try { tab?.fitAddon?.fit(); } catch(_){}
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

  overlay.style.removeProperty('display');

// ── Directory Browser ─────────────────────────────────────────────────────
const browseState = { path: '', entries: [] };
let _cwdDebounce = null;

const FOLDER_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="#60A5FA" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>`;

async function fetchDir(path) {
  const data = await api('GET', `/api/fs?path=${encodeURIComponent(path)}`);
  browseState.path    = data.path || path;
  browseState.entries = data.entries || [];
}

// 입력값에서 "탐색할 디렉토리"와 "필터 접두어"를 분리
function parseCwdInput(val) {
  const lastSep = Math.max(val.lastIndexOf('/'), val.lastIndexOf('\\'));
  if (lastSep === -1) return { basePath: '', filter: val };
  return { basePath: val.substring(0, lastSep + 1), filter: val.substring(lastSep + 1) };
}

function renderFilteredBrowser(filter) {
  document.getElementById('browser-path').textContent = browseState.path;
  const list = document.getElementById('browser-list');
  list.innerHTML = '';

  const lc = filter.toLowerCase();
  const matched = filter
    ? browseState.entries.filter(e => e.name.toLowerCase().startsWith(lc))
    : browseState.entries;

  if (matched.length === 0) {
    list.innerHTML = '<div class="px-4 py-3 text-xs font-mono text-on-surface-variant/40">No matches</div>';
    return;
  }

  matched.forEach((entry, idx) => {
    const div = document.createElement('div');
    div.className = `flex items-center gap-2 px-4 py-[7px] cursor-pointer transition-colors text-sm font-mono text-on-surface
      ${idx === 0 ? 'bg-surface-high' : 'hover:bg-surface-high'}`;
    div.dataset.name = entry.name;
    // 필터와 일치하는 부분을 강조
    const bold = esc(entry.name.slice(0, filter.length));
    const rest = esc(entry.name.slice(filter.length));
    div.innerHTML = `${FOLDER_ICON}<span class="text-secondary/90">${bold}</span>${rest}`;
    div.onmousedown = e => e.preventDefault();  // blur 방지
    div.onclick = async () => {
      const newPath = browseState.path.replace(/[\\/]$/, '') + '/' + entry.name;
      document.getElementById('modal-cwd').value = newPath;
      await fetchDir(newPath);
      renderFilteredBrowser('');
    };
    list.appendChild(div);
  });
}

function positionBrowser() {
  const input = document.getElementById('modal-cwd');
  const browser = document.getElementById('dir-browser');
  const rect = input.getBoundingClientRect();
  browser.style.top  = (rect.bottom + 4) + 'px';
  browser.style.left = rect.left + 'px';
  browser.style.width = rect.width + 'px';
}

async function openBrowserAuto() {
  const val = document.getElementById('modal-cwd').value;
  const { basePath, filter } = parseCwdInput(val);
  const targetBase = basePath || '';
  if (browseState.path !== targetBase) {
    await fetchDir(targetBase);
  }
  renderFilteredBrowser(filter);
  positionBrowser();
  document.getElementById('dir-browser').classList.remove('hidden');
  lucide.createIcons();
}

function handleCwdInput() {
  clearTimeout(_cwdDebounce);
  _cwdDebounce = setTimeout(async () => {
    const val = document.getElementById('modal-cwd').value;
    const { basePath, filter } = parseCwdInput(val);
    const targetBase = basePath || '';
    if (browseState.path !== targetBase) {
      await fetchDir(targetBase);
    }
    renderFilteredBrowser(filter);
    positionBrowser();
    document.getElementById('dir-browser').classList.remove('hidden');
  }, 120);
}

async function handleCwdKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); createChat(); return; }
  if (e.key === 'Tab') {
    e.preventDefault();
    const first = document.querySelector('#browser-list [data-name]');
    if (!first) return;
    const newPath = browseState.path.replace(/[\\/]$/, '') + '/' + first.dataset.name;
    document.getElementById('modal-cwd').value = newPath;
    await fetchDir(newPath);
    renderFilteredBrowser('');
  }
}

async function goUp() {
  await fetchDir(browseState.path + '/..');
  document.getElementById('modal-cwd').value = browseState.path;
  renderFilteredBrowser('');
  document.getElementById('modal-cwd').focus();
}

async function goHome() {
  await fetchDir('');
  document.getElementById('modal-cwd').value = browseState.path;
  renderFilteredBrowser('');
  document.getElementById('modal-cwd').focus();
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeNewChatModal();
}

async function createChat() {
  const cwd = document.getElementById('modal-cwd').value.trim();
  if (!cwd) { document.getElementById('modal-cwd').focus(); return; }
  const title = document.getElementById('modal-title').value.trim() || cwd;
  localStorage.setItem('lastCwd', cwd);
  closeNewChatModal();
  const chat = await api('POST', '/api/chats', { cwd, title });
  await loadChats();
  selectChat(chat.id, chat);
}

// ── Helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  return res.json().catch(() => ({}));
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Very minimal markdown-like rendering (bold, code)
function renderMarkdownLite(text) {
  // 펜스 코드블록(```lang\n...\n```)을 먼저 분리해서 처리
  const parts = text.split(/(```[\w]*\n[\s\S]*?```)/g);
  return parts.map(part => {
    const codeMatch = part.match(/^```(\w*)\n([\s\S]*)```$/);
    if (codeMatch) {
      const lang = codeMatch[1];
      const code = codeMatch[2].trimEnd();
      let highlighted;
      try {
        highlighted = lang && window.hljs
          ? hljs.highlight(code, { language: lang, ignoreIllegals: true }).value
          : esc(code);
      } catch (_) { highlighted = esc(code); }
      return `<pre class="hljs-pre"><code>${highlighted}</code></pre>`;
    }
    // 인라인 마크다운
    return esc(part)
      .replace(/`([^`\n]+)`/g, '<code class="font-mono text-xs bg-surface-high px-1 py-0.5 rounded text-primary">$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/^(\d+\.\s)/gm, '<span class="text-on-surface-variant">$1</span>')
      .replace(/^[-•]\s(.+)/gm, '  <span class="text-on-surface-variant">•</span> $1')
      .replace(/\n/g, '<br>');
  }).join('');
}
